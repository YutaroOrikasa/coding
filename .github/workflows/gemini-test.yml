name: Gemini Test
on:
  issue_comment:
    types: [created]

jobs:
  test-comment:
    if: contains(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0
        env:
          # ここで値を注入
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          # モデルを明示的に指定
          GEMINI_MODEL: "gemini-2.0-flash"


        with:
          # APIキーのパラメータ名を修正
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_model: "gemini-2.0-flash"
          # instructionではなくpromptを使う
          prompt: |
            ユーザーが「/test」と送ってきました。
            「認証に成功し、正常に動作しています！」という旨を、
            スマホ開発を応援するような明るい日本語でIssueに返信してください。
