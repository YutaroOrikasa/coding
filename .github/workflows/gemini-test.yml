name: Gemini Test

on:
  # プッシュをトリガーにする
  push:
    branches:
      - main
  # Issue へのコメント（/testなど）をトリガーにする
  issue_comment:
    types: [created]

jobs:
  gemini_job:
    # Issueコメントの場合、特定のキーワード（/test）が含まれる時のみ実行して節約
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/test'))
    runs-on: ubuntu-latest
    steps:
      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          GEMINI_MODEL: gemini-1.5-flash # 軽量・高速モデルを指定
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # ツール使用を禁止し、出力を最短にするプロンプト
          prompt: |
            ユーザーが「/test」と送りました。
            以下のルールを厳守してください：
            1. 返信は「認証成功！スマホ開発頑張りましょう！」の1行のみ。
            2. read_file などのツールは一切使用禁止。
            3. 思考プロセスは出力せず、結果のみ返してください。
