name: Gemini HelloWorld

on:
  push:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  # Job 1: Push時にコンソール出力
  hello-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # ここで環境変数を指定することで、このJob全体で信頼設定が有効になります
      GEMINI_CLI_TRUST_WORKSPACE: true
    steps:
      - name: Gemini Console Hello
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: "Push detected. Output 'System OK' to console."
          gemini_cli_args: >-
            --no-tools
            --skip-trust
            --model gemini-1.5-flash
            --max-output-tokens 10

  # Job 2: /test コメント時に Issue 返信
  hello-on-comment:
    if: |
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GEMINI_CLI_TRUST_WORKSPACE: true
    steps:
      - name: Gemini Issue Hello
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_issue_number: ${{ github.event.issue.number }}
          prompt: "Reply 'Hello from Issue! Verification successful.' to the user."
          gemini_cli_args: >-
            --no-tools
            --skip-trust
            --model gemini-1.5-flash
            --max-output-tokens 20
