name: Gemini Test

on:
  push:
    branches: [main]
  issue_comment:
    types: [created]

jobs:
  # ---------------------------------------------------------
  # Job 1: Push時にコンソールへ出力する専用ロボット
  # ---------------------------------------------------------
  hello-on-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Gemini Console Hello
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # ツール使用を禁止し、1.5-flash で極短の応答を強制
          prompt: "Push detected. Output 'System OK' to console and exit."
          gemini_cli_args: >-
            --no-tools
            --model gemini-1.5-flash
            --max-output-tokens 10

  # ---------------------------------------------------------
  # Job 2: /test コメント時に Issue へ返信する専用ロボット
  # ---------------------------------------------------------
  hello-on-comment:
    if: |
      github.event_name == 'issue_comment' && 
      contains(github.event.comment.body, '/test')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Gemini Issue Hello
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_issue_number: ${{ github.event.issue.number }}
          prompt: "Reply 'Hello from Issue! Verification successful.' to the user."
          gemini_cli_args: >-
            --no-tools
            --model gemini-1.5-flash
            --max-output-tokens 20
